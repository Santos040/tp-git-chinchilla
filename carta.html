<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carta</title>
</head>
<body>
    <section class="formulario">
        <h2>Registro de contacto</h2>
        <form>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre"><br><br>

            <label for="numero">Número de contacto:</label>
            <input type="tel" id="numero" name="numero" required><br><br>

            <label for="mesa">Número de mesa:</label>
            <input type="number" id="mesa" name="mesa" min="1" required><br><br>

            <button type="submit">Registrar</button>
        </form>
    </section>
    <section class="carta">
    <h1>
        "imagen de la carta"
    </h1>
    </section>

    <section class="botones">
    <a href="index.html">
        <button>
            volver al inicio 
        </button>
    </a>
    </section>
</body>
</html>
